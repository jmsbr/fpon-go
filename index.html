<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura do Saber - Jogo Educativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #f0f9ff; }
        .btn-game { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-game:active { transform: scale(0.95); }
        .loading-ring { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message-box { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-slate-800 pb-10">

    <div id="app" class="max-w-4xl mx-auto px-4 pt-6">
        <!-- Cabeçalho -->
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border-2 border-indigo-100">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showScreen('home')">
                <span class="text-3xl">🚀</span>
                <h1 class="text-xl font-bold text-indigo-600 uppercase tracking-tight">Aventura do Saber</h1>
            </div>
            <div id="stats" class="hidden flex items-center gap-4">
                <div class="bg-yellow-100 px-4 py-1 rounded-full border border-yellow-200 text-yellow-700 font-bold">
                    ⭐ <span id="star-count">0</span>
                </div>
            </div>
        </header>

        <!-- Container de Telas -->
        <main id="main-content">
            
            <!-- Tela Inicial -->
            <section id="screen-home" class="text-center py-10 space-y-8">
                <div class="text-9xl animate-bounce">🎒</div>
                <h2 class="text-4xl md:text-5xl font-bold text-slate-800">Olá, pequeno herói!</h2>
                <p class="text-xl text-slate-500">Vamos estudar para a prova jogando?</p>
                <div class="flex flex-col md:flex-row gap-4 justify-center">
                    <button onclick="showScreen('study')" class="btn-game bg-indigo-600 text-white px-10 py-5 rounded-3xl font-bold text-2xl shadow-xl hover:bg-indigo-700">
                        📖 Ver Explicações
                    </button>
                    <button onclick="startQuiz()" class="btn-game bg-pink-500 text-white px-10 py-5 rounded-3xl font-bold text-2xl shadow-xl hover:bg-pink-600">
                        🎮 Jogar Simulado
                    </button>
                </div>
            </section>

            <!-- Tela de Explicações -->
            <section id="screen-study" class="hidden space-y-6">
                <button onclick="showScreen('home')" class="text-indigo-600 font-bold flex items-center gap-2 mb-4 hover:-translate-x-1 transition">
                    ⬅ Voltar para o início
                </button>
                <div id="study-list" class="grid gap-6"></div>
            </section>

            <!-- Tela do Jogo -->
            <section id="screen-quiz" class="hidden">
                <div class="bg-white rounded-[40px] shadow-2xl p-6 md:p-10 border-8 border-indigo-50 relative overflow-hidden">
                    <div id="quiz-feedback" class="hidden absolute inset-0 z-50 bg-white/95 flex flex-col items-center justify-center p-8 text-center">
                        <div id="fb-icon" class="text-8xl mb-4"></div>
                        <h3 id="fb-title" class="text-3xl font-bold mb-4"></h3>
                        <p id="fb-text" class="text-xl text-slate-600 mb-8"></p>
                        <button onclick="nextQuestion()" class="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg">Continuar</button>
                    </div>

                    <div class="flex justify-between items-center mb-6">
                        <span id="q-cat" class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest"></span>
                        <span id="q-progress" class="text-slate-400 font-bold"></span>
                    </div>

                    <h2 id="q-text" class="text-2xl md:text-3xl font-bold text-slate-800 mb-8"></h2>
                    
                    <div id="q-options" class="grid gap-4"></div>
                </div>
            </section>

            <!-- Tela Final -->
            <section id="screen-results" class="hidden text-center py-10 space-y-6">
                <div class="text-9xl">💎</div>
                <h2 class="text-5xl font-bold text-slate-800">Missão Cumprida!</h2>
                <p class="text-2xl text-slate-500">Você conseguiu <span id="final-stars" class="text-indigo-600 font-bold"></span> estrelas!</p>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-12 py-5 rounded-3xl font-bold text-xl shadow-xl">Recomeçar Jornada</button>
            </section>

        </main>
    </div>

    <!-- Alerta Customizado (Caso áudio falhe) -->
    <div id="custom-alert" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-[100] message-box">
        <span id="alert-text"></span>
    </div>

    <script>
        const apiKey = ""; // Deixe vazio para o sistema preencher
        let stars = 0;
        let currentIdx = 0;
        let quizItems = [];
        let audioBusy = false;

        const contents = [
            {
                title: "Notícia Jornalística 🗞️",
                text: "A notícia conta fatos que aconteceram de verdade. Ela tem a Manchete (título chamativo) e o Lide (o resumo no primeiro parágrafo que diz: Quem? O quê? Onde? Quando?).",
                audio: "A notícia serve para informar sobre coisas reais. O título se chama manchete e o primeiro parágrafo se chama lide. É um texto informativo!"
            },
            {
                title: "Nomes Próprios e Comuns 🏷️",
                text: "Substantivos comuns são nomes de coisas em geral (bola, cachorro). Substantivos próprios são nomes de pessoas, cidades e países (Maria, Brasil). Nomes próprios sempre começam com LETRA MAIÚSCULA!",
                audio: "Não esqueça: nomes de pessoas, cidades e países são substantivos próprios e precisam de letra maiúscula no começo!"
            },
            {
                title: "Adjetivos: Características 🎨",
                text: "Adjetivos são palavras que dizem como as coisas são. Exemplos: O céu AZUL, a maçã DOCE, o menino CORAJOSO. Azul, doce e corajoso são adjetivos!",
                audio: "Os adjetivos dão qualidades aos nomes. Por exemplo, se eu digo que o carro é veloz, veloz é o adjetivo!"
            },
            {
                cat: "História",
                title: "Respeito e Igualdade 🤝",
                text: "Combater a discriminação racial é respeitar todas as pessoas, não importa a cor da pele ou a origem. Todos somos iguais e merecemos o mesmo respeito e carinho.",
                audio: "O respeito é fundamental! Combater o racismo significa valorizar todas as culturas e tratar todos com igualdade e amor."
            }
        ];

        // --- SISTEMA DE ÁUDIO CORRIGIDO ---
        async function playAudio(text, btn) {
            if (audioBusy) return;
            audioBusy = true;
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<div class="loading-ring"></div>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Diga com voz de professor amigável para uma criança pequena: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                if (!response.ok) throw new Error("Erro na rede");

                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                const sampleRate = parseInt(mimeType.split('rate=')[1]) || 24000;

                const wavUrl = pcmToWavUrl(pcmData, sampleRate);
                const audio = new Audio(wavUrl);
                
                audio.play().catch(e => {
                    showMsg("Clique na tela para habilitar o som!");
                });

                audio.onended = () => {
                    btn.innerHTML = originalContent;
                    audioBusy = false;
                };
            } catch (err) {
                console.error(err);
                showMsg("O áudio não pôde ser carregado. Verifique sua conexão.");
                btn.innerHTML = originalContent;
                audioBusy = false;
            }
        }

        function pcmToWavUrl(base64Pcm, sampleRate) {
            const pcmBuffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
            
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + pcmBuffer.byteLength, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, pcmBuffer.byteLength, true);

            const blob = new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' });
            return URL.createObjectURL(blob);
        }

        // --- LÓGICA DO JOGO ---
        function showScreen(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
            if (id === 'home') document.getElementById('stats').classList.add('hidden');
            else document.getElementById('stats').classList.remove('hidden');
            if (id === 'study') renderStudy();
        }

        function renderStudy() {
            const list = document.getElementById('study-list');
            list.innerHTML = contents.map(c => `
                <div class="bg-white p-6 rounded-[30px] shadow-sm border-2 border-slate-100 flex flex-col md:flex-row gap-4 items-start">
                    <div class="flex-grow">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-2xl font-bold text-indigo-600">${c.title}</h3>
                            <button onclick="playAudio('${c.audio.replace(/'/g, "\\'")}', this)" class="bg-indigo-50 text-indigo-600 p-3 rounded-full hover:bg-indigo-100 transition shadow-sm">
                                🔊 Ouvir
                            </button>
                        </div>
                        <p class="text-slate-600 text-lg">${c.text}</p>
                    </div>
                </div>
            `).join('');
        }

        function startQuiz() {
            // Gerar 80 questões (simuladas por repetição dos templates para o exemplo)
            const templates = [
                { q: "Qual o nome do título de uma notícia?", cat: "Português", opts: ["Manchete", "Lide", "Rodapé", "Dicionário"], ans: 0, exp: "A manchete é o título que chama atenção!" },
                { q: "Qual palavra precisa de letra MAIÚSCULA?", cat: "Gramática", opts: ["mesa", "brasil", "sapato", "escola"], ans: 1, exp: "Brasil é nome de país, por isso é Próprio!" },
                { q: "Qual destes é um adjetivo?", cat: "Gramática", opts: ["carro", "menina", "inteligente", "casa"], ans: 2, exp: "Inteligente é uma característica." },
                { q: "O primeiro parágrafo da notícia se chama:", cat: "Português", opts: ["Lide", "Fim", "Capa", "Desenho"], ans: 0, exp: "O lide conta o que aconteceu logo no início." },
                { q: "Tratar mal um amigo pela cor da pele é:", cat: "História", opts: ["Certo", "Legal", "Discriminação", "Engraçado"], ans: 2, exp: "Isso é errado e injusto." }
            ];
            
            quizItems = [];
            for(let i=0; i<80; i++) {
                quizItems.push({...templates[i % templates.length], id: i});
            }
            
            currentIdx = 0;
            stars = 0;
            updateUI();
            showScreen('quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizItems[currentIdx];
            document.getElementById('quiz-feedback').classList.add('hidden');
            document.getElementById('q-cat').innerText = q.cat;
            document.getElementById('q-progress').innerText = `${currentIdx + 1} / 80`;
            document.getElementById('q-text').innerText = q.q;

            const opts = document.getElementById('q-options');
            opts.innerHTML = q.opts.map((o, i) => `
                <button onclick="handleAnswer(${i})" class="w-full text-left p-5 rounded-2xl border-4 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-bold text-lg text-slate-700">
                    ${String.fromCharCode(65 + i)}) ${o}
                </button>
            `).join('');
        }

        function handleAnswer(idx) {
            const q = quizItems[currentIdx];
            const isCorrect = idx === q.ans;
            
            const fb = document.getElementById('quiz-feedback');
            fb.classList.remove('hidden');
            
            if (isCorrect) {
                stars += 10;
                document.getElementById('fb-icon').innerText = "⭐";
                document.getElementById('fb-title').innerText = "Incrível!";
                document.getElementById('fb-title').className = "text-3xl font-bold text-green-500 mb-4";
                document.getElementById('fb-text').innerText = "Você acertou e ganhou estrelas!";
            } else {
                document.getElementById('fb-icon').innerText = "💡";
                document.getElementById('fb-title').innerText = "Ops!";
                document.getElementById('fb-title').className = "text-3xl font-bold text-amber-500 mb-4";
                document.getElementById('fb-text').innerText = q.exp;
            }
            updateUI();
        }

        function nextQuestion() {
            if (currentIdx < 79) {
                currentIdx++;
                renderQuestion();
            } else {
                showScreen('results');
                document.getElementById('final-stars').innerText = stars;
            }
        }

        function updateUI() {
            document.getElementById('star-count').innerText = stars;
        }

        function showMsg(text) {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = text;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        window.onload = () => showScreen('home');
    </script>
</body>
</html>
