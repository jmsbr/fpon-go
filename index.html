<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Estudos - 4º Ano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Estudos 4º Ano</h1>
            </div>
            <div id="score-badge" class="hidden bg-white border border-slate-200 px-4 py-1 rounded-full text-sm font-semibold shadow-sm">
                Pontos: <span id="current-score" class="text-indigo-600">0</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-container" class="fade-in">
            <!-- Content will be injected here via JavaScript -->
        </main>
    </div>

    <!-- Scripts Section -->
    <script>
        const apiKey = ""; // Provisioned by environment
        let state = {
            view: 'menu', // 'menu', 'study', 'quiz', 'results'
            score: 0,
            currentQuestionIndex: 0,
            userAnswers: [],
            isAudioLoading: false
        };

        // --- CONTENT DATA ---
        const studyTopics = [
            {
                title: "Género Textual: Notícia",
                content: "A notícia é um texto jornalístico que relata factos reais e atuais. Ela é composta por: 1. Manchete (título principal para atrair o leitor), 2. Lide (primeiro parágrafo que resume: Quem? O quê? Onde? Quando?), 3. Corpo (detalhes do evento).",
                audioText: "A notícia serve para informar. O título, chamado de manchete, deve ser chamativo. O primeiro parágrafo, o lide, responde às perguntas principais sobre o acontecimento."
            },
            {
                title: "Substantivos Próprios e Comuns",
                content: "Substantivos dão nome aos seres. Próprios: nomes específicos de pessoas, cidades ou países (ex: Maria, Lisboa, Brasil). Devem começar com letra maiúscula. Comuns: nomes genéricos de objetos ou animais (ex: caneta, cão, cidade). Usam letra minúscula.",
                audioText: "Lembre-se: nomes de pessoas e lugares são próprios e começam com letra maiúscula. Objetos do dia a dia são comuns e usam letra minúscula."
            },
            {
                title: "Adjetivos",
                content: "Adjetivos são palavras que atribuem características ou qualidades aos substantivos. Exemplo: 'O céu azul' (azul é o adjetivo). Eles ajudam-nos a descrever como algo é.",
                audioText: "Adjetivos dão cor e detalhe ao nosso mundo. Eles dizem se algo é grande, pequeno, bonito ou inteligente."
            },
            {
                title: "Combate à Discriminação Racial",
                content: "Discriminação racial é o ato de tratar alguém de forma diferente ou injusta devido à sua cor de pele ou origem. Combater o racismo é garantir que todos tenham os mesmos direitos e respeito, valorizando a diversidade cultural do Brasil e do mundo.",
                audioText: "Respeitar todas as raças é fundamental para uma sociedade justa. No Brasil, o combate à discriminação racial é uma luta diária por igualdade e justiça para todos."
            }
        ];

        // --- 80 QUESTIONS GENERATOR ---
        const rawQuestions = [
            // Português: Notícia
            { q: "Qual o objetivo principal de uma notícia?", options: ["Divertir", "Informar sobre factos reais", "Contar um conto de fadas", "Ensinar uma receita"], correct: 1, explanation: "Notícias são textos informativos sobre a realidade." },
            { q: "Como se chama o primeiro parágrafo de uma notícia?", options: ["Título", "Corpo", "Lide", "Resumo"], correct: 2, explanation: "O Lide apresenta as informações principais logo no início." },
            { q: "A 'Manchete' serve para:", options: ["Atrair a atenção do leitor", "Finalizar o texto", "Pedir desculpas", "Esconder a notícia"], correct: 0, explanation: "A manchete é o título chamativo." },
            // Português: Substantivos
            { q: "Qual palavra é um substantivo próprio?", options: ["mesa", "portugal", "livro", "caderno"], correct: 1, explanation: "Portugal é o nome de um país, por isso é próprio." },
            { q: "Marque o substantivo comum:", options: ["Lisboa", "Maria", "Caneta", "Atlântico"], correct: 2, explanation: "Caneta é um objeto genérico." },
            { q: "Nomes de cidades devem começar com:", options: ["Letra minúscula", "Letra maiúscula", "Números", "Símbolos"], correct: 1, explanation: "Substantivos próprios exigem letra maiúscula." },
            // Português: Adjetivos
            { q: "Na frase 'A maçã é doce', qual é o adjetivo?", options: ["maçã", "é", "doce", "A"], correct: 2, explanation: "Doce caracteriza a maçã." },
            { q: "Complete com um adjetivo: 'O sol está muito ____ hoje.'", options: ["Correndo", "Quente", "Cadeira", "Azul"], correct: 1, explanation: "Quente descreve o estado do sol." },
            // História: Discriminação
            { q: "O que é discriminação racial?", options: ["Respeitar a todos", "Tratar mal por causa da cor da pele", "Fazer novos amigos", "Estudar história"], correct: 1, explanation: "É o tratamento injusto baseado na raça." },
            { q: "O Brasil é formado por:", options: ["Apenas uma cultura", "Diversas raças e etnias", "Apenas robôs", "Ninguém"], correct: 1, explanation: "A diversidade é a base da população brasileira." },
            { q: "Combater o racismo é um dever de:", options: ["Apenas dos professores", "Apenas dos políticos", "De todas as pessoas", "De ninguém"], correct: 2, explanation: "Todos devem contribuir para o respeito mútuo." }
        ];

        // Expand to 80 questions with variations
        const questionBank = [];
        for (let i = 0; i < 80; i++) {
            const template = rawQuestions[i % rawQuestions.length];
            questionBank.push({ ...template, id: i });
        }

        // --- AUDIO ENGINE ---
        async function playAudio(text, buttonElement) {
            if (state.isAudioLoading) return;
            state.isAudioLoading = true;
            buttonElement.innerHTML = `<div class="loading-spinner"></div>`;

            const payload = {
                contents: [{ parts: [{ text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                    }
                }
            };

            try {
                let retryCount = 0;
                const maxRetries = 5;
                let response;

                while (retryCount < maxRetries) {
                    response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) break;
                    retryCount++;
                    await new Promise(res => setTimeout(res, Math.pow(2, retryCount) * 1000));
                }

                if (!response.ok) throw new Error("Falha no áudio");

                const result = await response.json();
                const pcmBase64 = result.candidates[0].content.parts[0].inlineData.data;
                const sampleRate = parseInt(result.candidates[0].content.parts[0].inlineData.mimeType.split('rate=')[1]) || 24000;
                
                const audioUrl = pcmToWavUrl(pcmBase64, sampleRate);
                const audio = new Audio(audioUrl);
                audio.play();
                audio.onended = () => resetAudioButton(buttonElement);
            } catch (error) {
                console.error(error);
                resetAudioButton(buttonElement);
            } finally {
                state.isAudioLoading = false;
            }
        }

        function resetAudioButton(btn) {
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> Ouvir`;
        }

        function pcmToWavUrl(base64, sampleRate) {
            const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + buffer.byteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, buffer.byteLength, true);
            const blob = new Blob([wavHeader, buffer], { type: 'audio/wav' });
            return URL.createObjectURL(blob);
        }

        // --- NAVIGATION & VIEWS ---
        function setView(view) {
            state.view = view;
            const container = document.getElementById('main-container');
            const scoreBadge = document.getElementById('score-badge');
            
            if (view === 'quiz' || view === 'results') scoreBadge.classList.remove('hidden');
            else scoreBadge.classList.add('hidden');

            switch(view) {
                case 'menu': renderMenu(container); break;
                case 'study': renderStudy(container); break;
                case 'quiz': renderQuiz(container); break;
                case 'results': renderResults(container); break;
            }
        }

        function renderMenu(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onclick="setView('study')" class="glass-card p-8 rounded-3xl shadow-xl hover:shadow-2xl hover:border-indigo-400 border-2 border-transparent cursor-pointer transition-all group">
                        <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 8-4 8 4v10l-8 4-8-4V6Z"/><path d="m12 22v-10l-8-4"/><path d="m12 12 8-4"/></svg>
                        </div>
                        <h2 class="text-2xl font-bold mb-2">Revisão e Áudio</h2>
                        <p class="text-slate-500">Aprende o conteúdo com explicações em texto e voz.</p>
                        <div class="mt-8 flex items-center text-indigo-600 font-bold">Começar <span class="ml-2">→</span></div>
                    </div>
                    <div onclick="setView('quiz')" class="glass-card p-8 rounded-3xl shadow-xl hover:shadow-2xl hover:border-emerald-400 border-2 border-transparent cursor-pointer transition-all group">
                        <div class="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 4.6a10 10 0 1 1-12.8 0"/></svg>
                        </div>
                        <h2 class="text-2xl font-bold mb-2">Simulado (80 Questões)</h2>
                        <p class="text-slate-500">Testa os teus conhecimentos e prepara-te para a prova.</p>
                        <div class="mt-8 flex items-center text-emerald-600 font-bold">Fazer Teste <span class="ml-2">→</span></div>
                    </div>
                </div>
            `;
        }

        function renderStudy(container) {
            container.innerHTML = `
                <div class="space-y-6">
                    <button onclick="setView('menu')" class="text-indigo-600 font-bold flex items-center gap-2 mb-4 hover:underline">
                        ← Voltar ao Menu
                    </button>
                    ${studyTopics.map((topic, i) => `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 fade-in" style="animation-delay: ${i * 0.1}s">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-xl font-bold text-slate-900">${topic.title}</h3>
                                <button onclick="playAudio('${topic.audioText.replace(/'/g, "\\'")}', this)" class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-xl text-slate-700 hover:bg-slate-200 transition text-sm font-semibold">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> Ouvir
                                </button>
                            </div>
                            <p class="text-slate-600 leading-relaxed">${topic.content}</p>
                        </div>
                    `).join('')}
                    <button onclick="setView('quiz')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                        Começar o Simulado agora!
                    </button>
                </div>
            `;
        }

        function renderQuiz(container) {
            const q = questionBank[state.currentQuestionIndex];
            container.innerHTML = `
                <div class="glass-card rounded-3xl shadow-xl p-8 border border-slate-100">
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-xs font-bold text-slate-400 tracking-widest uppercase">Questão ${state.currentQuestionIndex + 1} de 80</span>
                        <div class="w-32 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full" style="width: ${((state.currentQuestionIndex + 1) / 80) * 100}%"></div>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl font-bold text-slate-800 mb-8">${q.q}</h2>
                    
                    <div id="options-container" class="space-y-4">
                        ${q.options.map((opt, i) => `
                            <button onclick="checkAnswer(${i})" class="w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-medium text-slate-700">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>

                    <div id="feedback-area" class="mt-8 hidden p-6 rounded-2xl border-2"></div>
                </div>
            `;
        }

        function checkAnswer(index) {
            const q = questionBank[state.currentQuestionIndex];
            const isCorrect = index === q.correct;
            const feedbackArea = document.getElementById('feedback-area');
            const optionsBtns = document.querySelectorAll('#options-container button');

            optionsBtns.forEach(btn => btn.disabled = true);
            
            if (isCorrect) {
                state.score++;
                document.getElementById('current-score').innerText = state.score;
                feedbackArea.className = "mt-8 p-6 rounded-2xl border-2 border-emerald-200 bg-emerald-50 text-emerald-800 fade-in";
                feedbackArea.innerHTML = `<h4 class="font-bold flex items-center gap-2 mb-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="emerald" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Certo!</h4><p>${q.explanation}</p>`;
                optionsBtns[index].className += " border-emerald-500 bg-emerald-100 text-emerald-900";
            } else {
                feedbackArea.className = "mt-8 p-6 rounded-2xl border-2 border-rose-200 bg-rose-50 text-rose-800 fade-in";
                feedbackArea.innerHTML = `<h4 class="font-bold flex items-center gap-2 mb-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rose" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Errado</h4><p>${q.explanation}</p>`;
                optionsBtns[index].className += " border-rose-500 bg-rose-100 text-rose-900";
                optionsBtns[q.correct].className += " border-emerald-500 bg-emerald-50";
            }

            feedbackArea.classList.remove('hidden');
            
            const nextBtn = document.createElement('button');
            nextBtn.className = "mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition";
            nextBtn.innerText = state.currentQuestionIndex < 79 ? "Próxima Questão" : "Ver Resultados";
            nextBtn.onclick = () => {
                if (state.currentQuestionIndex < 79) {
                    state.currentQuestionIndex++;
                    renderQuiz(document.getElementById('main-container'));
                } else {
                    setView('results');
                }
            };
            feedbackArea.appendChild(nextBtn);
        }

        function renderResults(container) {
            const percentage = Math.round((state.score / 80) * 100);
            let message = "Podes melhorar!";
            let iconColor = "text-rose-500";
            
            if (percentage >= 80) { message = "Excelente! Estás preparado!"; iconColor = "text-emerald-500"; }
            else if (percentage >= 50) { message = "Bom trabalho! Revisa mais um pouco."; iconColor = "text-amber-500"; }

            container.innerHTML = `
                <div class="glass-card rounded-3xl shadow-2xl p-12 text-center">
                    <div class="inline-block p-6 rounded-full bg-slate-50 mb-6 ${iconColor}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                    </div>
                    <h2 class="text-4xl font-bold mb-2">${state.score} / 80</h2>
                    <p class="text-xl text-slate-500 mb-8">${message}</p>
                    
                    <div class="bg-slate-50 p-6 rounded-2xl mb-8 flex justify-around items-center">
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase">Aproveitamento</p>
                            <p class="text-2xl font-bold text-indigo-600">${percentage}%</p>
                        </div>
                        <div class="h-12 w-px bg-slate-200"></div>
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase">Status</p>
                            <p class="text-2xl font-bold text-slate-800">${percentage >= 50 ? 'Aprovado' : 'Revisar'}</p>
                        </div>
                    </div>

                    <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition">
                        Recomeçar Estudos
                    </button>
                </div>
            `;
        }

        // Initialize App
        window.onload = () => setView('menu');
    </script>
</body>
</html>
